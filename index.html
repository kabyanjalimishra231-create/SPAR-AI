<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time AI Assistant (2026 Ready)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-card {
      width: 100%;
      max-width: 768px;
      height: 85vh;
      background-color: #1e293b;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid #334155;
    }

    .chat-header {
      padding: 16px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #0f172a;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .chat-header h2 {
      font-size: 1.1rem;
      color: #38bdf8;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    select, input[type="password"] {
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #475569;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
    }

    .chat-body {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background-color: #2563eb;
      color: #ffffff;
    }

    .message.assistant {
      align-self: flex-start;
      background-color: #334155;
      color: #f8fafc;
    }

    .message.system-status {
      align-self: center;
      background: transparent;
      color: #94a3b8;
      font-size: 0.8rem;
      font-style: italic;
    }

    .chat-footer {
      padding: 16px;
      border-top: 1px solid #334155;
      display: flex;
      gap: 10px;
      background-color: #0f172a;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    .chat-footer input[type="text"] {
      flex: 1;
      background: #1e293b;
      border: 1px solid #475569;
      color: #f8fafc;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .chat-footer button {
      background: #0284c7;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-footer button:hover {
      background: #0369a1;
    }
  </style>
</head>
<body>

<div class="chat-card">
  <div class="chat-header">
    <h2>AI Search Assistant</h2>
    <div class="controls">
      <select id="providerSelect">
        <option value="groq">Groq (Llama 3.3)</option>
        <option value="openrouter">OpenRouter (Online Search)</option>
      </select>
      <input 
        type="password" 
        id="apiKeyInput" 
        placeholder="Enter API Key" 
        value="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"
        onchange="saveApiKey()" 
      />
    </div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="message assistant">Hello! Ask me anything about current events, topics, or standard questions.</div>
  </div>

  <div class="chat-footer">
    <input type="text" id="userInput" placeholder="Type your prompt here..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  // Hardcoded fallback key provided
  const DEFAULT_GROQ_KEY = "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";

  // Auto-load key on page load
  window.addEventListener("DOMContentLoaded", () => {
    const savedKey = localStorage.getItem("userApiKey");
    if (savedKey) {
      document.getElementById("apiKeyInput").value = savedKey;
    } else {
      document.getElementById("apiKeyInput").value = DEFAULT_GROQ_KEY;
    }
  });

  function saveApiKey() {
    const key = document.getElementById("apiKeyInput").value.trim();
    localStorage.setItem("userApiKey", key);
  }

  async function sendMessage() {
    const userInput = document.getElementById("userInput");
    const chatBody = document.getElementById("chatBody");
    const provider = document.getElementById("providerSelect").value;
    const apiKey = document.getElementById("apiKeyInput").value.trim() || DEFAULT_GROQ_KEY;

    const query = userInput.value.trim();
    if (!query) return;

    if (!apiKey) {
      alert("Please enter an API Key.");
      return;
    }

    // Render User Message
    appendMessage(query, "user");
    userInput.value = "";

    // Render Status Message
    const statusId = appendMessage("Fetching real-time context...", "system-status");

    try {
      let aiResponseText = "";

      if (provider === "groq") {
        // Step 1: Fetch Live Search Context via Wikipedia REST API
        const webContext = await fetchRealTimeContext(query);
        
        updateStatus(statusId, "Generating response with Groq...");

        // Step 2: Query Groq API with 2026 Temporal Prompting
        aiResponseText = await queryGroqAPI(query, webContext, apiKey);

      } else if (provider === "openrouter") {
        updateStatus(statusId, "Searching web and generating via OpenRouter...");
        
        // Query OpenRouter with the `:online` search plugin tag
        aiResponseText = await queryOpenRouterAPI(query, apiKey);
      }

      // Remove status & display assistant reply
      removeMessage(statusId);
      appendMessage(aiResponseText, "assistant");

    } catch (error) {
      console.error(error);
      removeMessage(statusId);
      appendMessage(`Error: ${error.message}`, "assistant");
    }
  }

  // Live Web Context Fetcher (Wikipedia REST API)
  async function fetchRealTimeContext(query) {
    try {
      const wikiUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
      const res = await fetch(wikiUrl);
      if (res.ok) {
        const data = await res.json();
        if (data.extract) {
          return data.extract;
        }
      }
    } catch (err) {
      console.warn("Could not fetch Wikipedia context:", err);
    }
    return "";
  }

  // Provider 1: Groq API Call Implementation
  async function queryGroqAPI(userInput, webContext, apiKey) {
    const today = new Date().toISOString().split('T')[0];

    const systemPrompt = `Today's date is ${today}. You are a helpful real-time assistant. 
When answering, rely on current context and information up to the year 2026. 
${webContext ? `[LIVE SEARCH CONTEXT]:\n${webContext}` : ''}`;

    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: userInput }
        ],
        temperature: 0.5
      })
    });

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.error?.message || "Groq API request failed.");
    }

    const data = await response.json();
    return data.choices[0].message.content;
  }

  // Provider 2: OpenRouter API Call Implementation
  async function queryOpenRouterAPI(userInput, apiKey) {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "meta-llama/llama-3.3-70b-instruct:online",
        messages: [
          { role: "user", content: userInput }
        ]
      })
    });

    if (!response.ok) {
      const errData = await response.json();
      throw new Error(errData.error?.message || "OpenRouter API request failed.");
    }

    const data = await response.json();
    return data.choices[0].message.content;
  }

  // UI Helpers
  function appendMessage(text, role) {
    const chatBody = document.getElementById("chatBody");
    const msgDiv = document.createElement("div");
    const id = "msg-" + Date.now();
    msgDiv.id = id;
    msgDiv.className = `message ${role}`;
    msgDiv.textContent = text;
    chatBody.appendChild(msgDiv);
    chatBody.scrollTop = chatBody.scrollHeight;
    return id;
  }

  function updateStatus(id, newText) {
    const el = document.getElementById(id);
    if (el) el.textContent = newText;
  }

  function removeMessage(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>

</body>
</html>
