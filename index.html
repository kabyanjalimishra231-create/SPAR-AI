<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#131314] text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- HEADER / NAVIGATION -->
    <header class="border-b border-[#2d2f31] bg-[#1e1f20] px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-blue-600/20 text-blue-400 flex items-center justify-center font-bold text-base border border-blue-500/30">
                <i class="fa-solid fa-sparkles"></i>
            </div>
            <span class="font-bold text-lg text-gray-100 tracking-wide">Spar AI</span>
        </div>

        <div class="flex items-center gap-3">
            <!-- STATUS / PROMO MODAL TRIGGER -->
            <button onclick="openSubscriptionModal()" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-[#2d2f31] border border-[#3c4043] text-xs font-medium hover:border-gray-500 transition">
                <i id="user-badge-icon" class="fa-solid fa-bolt text-yellow-400"></i>
                <span id="user-status-text">Free Credits: <strong id="credits-count" class="text-white">5</strong></span>
            </button>
            
            <!-- ADMIN QUICK-LINK -->
            <a href="admin.html" target="_blank" title="Open Admin Panel" class="p-2 text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-gear"></i>
            </a>
        </div>
    </header>

    <!-- CHAT INTERFACE AREA -->
    <main class="flex-1 max-w-3xl w-full mx-auto p-4 flex flex-col justify-between space-y-4">
        
        <!-- MESSAGES CONTAINER -->
        <div id="chat-box" class="flex-1 space-y-4 overflow-y-auto max-h-[70vh] pr-2">
            <!-- Initial welcome message -->
            <div class="flex items-start gap-3">
                <div class="w-7 h-7 rounded-full bg-blue-600/20 text-blue-400 flex items-center justify-center text-xs shrink-0 border border-blue-500/30">
                    <i class="fa-solid fa-sparkles"></i>
                </div>
                <div class="bg-[#1e1f20] border border-[#2d2f31] rounded-2xl p-3.5 text-sm max-w-[85%] text-gray-200">
                    Hello! How can I help you today?
                </div>
            </div>
        </div>

        <!-- INPUT BOX -->
        <div class="relative">
            <form onsubmit="handleSend(event)" class="flex items-center bg-[#1e1f20] border border-[#2d2f31] rounded-2xl p-2 focus-within:border-blue-500/50 transition shadow-lg">
                <input id="chat-input" type="text" placeholder="Type a message..." class="flex-1 bg-transparent px-3 text-sm text-gray-100 focus:outline-none">
                <button type="submit" class="p-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition flex items-center justify-center">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- SUBSCRIPTION & PROMO MODAL -->
    <div id="sub-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-[#1e1f20] border border-[#2d2f31] rounded-2xl p-6 max-w-md w-full space-y-5 shadow-2xl relative">
            <button onclick="closeSubscriptionModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-sm">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <div class="text-center space-y-1">
                <div class="w-12 h-12 rounded-2xl bg-amber-500/20 text-amber-400 flex items-center justify-center mx-auto text-xl border border-amber-500/30">
                    <i class="fa-solid fa-crown"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-100">Upgrade to Spar AI Pro</h3>
                <p class="text-xs text-gray-400">Unlock unlimited responses and access priority models.</p>
            </div>

            <!-- PRICE DISPLAY -->
            <div class="bg-[#131314] border border-[#2d2f31] p-4 rounded-xl flex justify-between items-center">
                <div>
                    <h4 class="font-bold text-sm text-gray-200">Pro Pass</h4>
                    <p class="text-[11px] text-gray-500">Unlimited queries & zero rate limits</p>
                </div>
                <span id="modal-price-display" class="text-lg font-extrabold text-emerald-400">$4.99</span>
            </div>

            <!-- PROMO CODE INPUT FORM -->
            <div class="space-y-2">
                <label class="text-xs text-gray-400 font-medium">Have a Promo Code or License Key?</label>
                <div class="flex gap-2">
                    <input id="promo-code-input" type="text" placeholder="ENTER-CODE" class="flex-1 bg-[#131314] border border-[#2d2f31] text-xs text-gray-100 p-2.5 rounded-xl uppercase focus:outline-none focus:border-amber-500">
                    <button onclick="applyPromoCode()" class="px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-black font-bold text-xs rounded-xl transition">
                        Redeem
                    </button>
                </div>
                <p id="promo-msg" class="text-xs hidden"></p>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT APP LOGIC -->
    <script>
        // --- GROQ API KEY CONFIGURATION ---
        // REPLACE THIS WITH YOUR ACTUAL GROQ API KEY (starts with gsk_)
        const GROQ_API_KEY = "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";

        // --- ADMIN CONFIGURATION SYNC ---
        function getSystemConfig() {
            const freeCreditsLimit = parseInt(localStorage.getItem('spar_ai_free_credits') || "5");
            const priceDisplay = localStorage.getItem('spar_ai_sub_price') || "$4.99";
            const validCodes = JSON.parse(localStorage.getItem('spar_ai_promo_codes')) || ["PRO-UNLIMITED-2026", "VIP-SPAR-AI", "MEMBERSHIP-2026"];
            const isPro = localStorage.getItem('spar_ai_pro_active') === 'true';

            return { freeCreditsLimit, priceDisplay, validCodes, isPro };
        }

        // Initialize User Session State
        let config = getSystemConfig();
        
        // Track session credits based on admin limit
        let userCredits = parseInt(sessionStorage.getItem('spar_ai_user_credits'));
        if (isNaN(userCredits)) {
            userCredits = config.freeCreditsLimit;
            sessionStorage.setItem('spar_ai_user_credits', userCredits);
        }

        // Refresh UI with dynamic settings
        function updateUI() {
            config = getSystemConfig();
            document.getElementById('modal-price-display').innerText = config.priceDisplay;

            const badgeIcon = document.getElementById('user-badge-icon');
            const statusText = document.getElementById('user-status-text');

            if (config.isPro) {
                badgeIcon.className = "fa-solid fa-crown text-amber-400";
                statusText.innerHTML = `<strong class="text-amber-400">PRO VIP</strong>`;
            } else {
                badgeIcon.className = "fa-solid fa-bolt text-yellow-400";
                statusText.innerHTML = `Free Credits: <strong id="credits-count" class="text-white">${userCredits}</strong>`;
            }
        }

        // Chat Logic with Groq API Connection
        async function handleSend(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();

            if (!text) return;

            // Check credits if not PRO
            if (!config.isPro && userCredits <= 0) {
                openSubscriptionModal();
                return;
            }

            appendMessage('user', text);
            input.value = '';

            // Deduct credit if on Free Tier
            if (!config.isPro) {
                userCredits--;
                sessionStorage.setItem('spar_ai_user_credits', userCredits);
                updateUI();
            }

            // Show a temporary "Thinking..." placeholder message
            const loadingId = appendMessage('ai', 'Thinking...');

            try {
                // --- GROQ API REQUEST ---
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "user",
                                content: text
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.choices[0].message.content;

                // Replace loading text with the AI's response
                document.getElementById(loadingId).innerText = aiResponse;

            } catch (error) {
                console.error("Groq API Error:", error);
                document.getElementById(loadingId).innerText = "Error: Unable to connect to Groq API. Please verify your API key.";
            }
        }

        // Helper function to render chat bubbles and return message container ID
        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            const msgId = 'msg-' + Date.now();
            
            if (sender === 'user') {
                msgDiv.className = "flex items-start justify-end gap-3";
                msgDiv.innerHTML = `
                    <div class="bg-blue-600 text-white rounded-2xl p-3.5 text-sm max-w-[85%] whitespace-pre-wrap">
                        ${text}
                    </div>
                `;
            } else {
                msgDiv.className = "flex items-start gap-3";
                msgDiv.innerHTML = `
                    <div class="w-7 h-7 rounded-full bg-blue-600/20 text-blue-400 flex items-center justify-center text-xs shrink-0 border border-blue-500/30">
                        <i class="fa-solid fa-sparkles"></i>
                    </div>
                    <div id="${msgId}" class="bg-[#1e1f20] border border-[#2d2f31] rounded-2xl p-3.5 text-sm max-w-[85%] text-gray-200 whitespace-pre-wrap">
                        ${text}
                    </div>
                `;
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgId;
        }

        // Modal Controls
        function openSubscriptionModal() {
            updateUI();
            document.getElementById('sub-modal').classList.remove('hidden');
        }

        function closeSubscriptionModal() {
            document.getElementById('sub-modal').classList.add('hidden');
            document.getElementById('promo-msg').classList.add('hidden');
        }

        // Apply Code logic checking against Admin state
        function applyPromoCode() {
            const codeInput = document.getElementById('promo-code-input').value.trim().toUpperCase();
            const msg = document.getElementById('promo-msg');

            if (config.validCodes.includes(codeInput)) {
                localStorage.setItem('spar_ai_pro_active', 'true');
                msg.className = "text-xs text-emerald-400 block";
                msg.innerText = "Code applied successfully! You are now a PRO user.";
                
                setTimeout(() => {
                    closeSubscriptionModal();
                    updateUI();
                }, 1200);
            } else {
                msg.className = "text-xs text-red-400 block";
                msg.innerText = "Invalid or expired promo code.";
            }
        }

        // Sync initial state on load
        window.onload = updateUI;
    </script>
</body>
</html>
