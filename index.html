<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#131314] text-gray-200 font-sans min-h-screen flex flex-col">

    <!-- OPENAI CONFIGURATION -->
    <script>
        // 1. Paste your OpenAI API key below (Starts with sk- or sk-proj-)
        const OPENAI_API_KEY = "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"; 
        const OPENAI_ENDPOINT = "https://api.openai.com/v1/chat/completions";
    </script>

    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-[#2d2f31] bg-[#1e1f20]">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-sparkles text-blue-400 text-xl"></i>
            <span class="font-bold text-lg text-white">Spar AI</span>
        </div>
        <span class="text-xs bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2.5 py-1 rounded-full">
            Powered by OpenAI
        </span>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 overflow-y-auto space-y-4" id="chat-box">
        <!-- Welcome Message -->
        <div class="flex gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600/20 text-blue-400 flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-sparkles text-sm"></i>
            </div>
            <div class="bg-[#1e1f20] border border-[#2d2f31] text-gray-200 p-4 rounded-2xl rounded-tl-none text-sm max-w-[85%] space-y-2 shadow-sm">
                <div class="flex items-center gap-2 text-blue-400 font-bold text-xs">
                    Spar AI
                </div>
                <p class="leading-relaxed">Hello! I'm Spar AI. How can I help you today?</p>
            </div>
        </div>
    </main>

    <!-- Footer Input Bar -->
    <footer class="max-w-4xl w-full mx-auto p-4">
        <form id="chat-form" onsubmit="handleFormSubmit(event)" class="relative flex items-center">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Ask Spar anything..." 
                class="w-full bg-[#1e1f20] border border-[#2d2f31] rounded-full py-3.5 pl-5 pr-14 text-sm text-gray-100 placeholder-gray-400 focus:outline-none focus:border-blue-500 transition-colors shadow-lg"
                autocomplete="off"
            >
            <button 
                type="submit" 
                id="send-btn"
                class="absolute right-2 bg-blue-600 hover:bg-blue-500 text-white w-9 h-9 rounded-full flex items-center justify-center transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
            >
                <i class="fa-solid fa-paper-plane text-xs"></i>
            </button>
        </form>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const inputField = document.getElementById('user-input');
            const prompt = inputField.value.trim();

            if (!prompt) return;

            // Clear input
            inputField.value = '';

            // Add User Message to Chat
            const chatBox = document.getElementById('chat-box');
            const userBubble = `
                <div class="flex justify-end gap-3">
                    <div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none text-sm max-w-[85%] shadow-sm">
                        <p class="leading-relaxed whitespace-pre-wrap">${escapeHTML(prompt)}</p>
                    </div>
                </div>`;
            chatBox.insertAdjacentHTML('beforeend', userBubble);

            // Add Temporary AI Loading Bubble
            const loadingId = 'loading-' + Date.now();
            const aiLoadingBubble = `
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-600/20 text-blue-400 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-sparkles text-sm"></i>
                    </div>
                    <div id="${loadingId}" class="bg-[#1e1f20] border border-[#2d2f31] text-gray-400 p-4 rounded-2xl rounded-tl-none text-sm flex items-center gap-2">
                        <i class="fa-solid fa-circle-notch fa-spin text-blue-400"></i> Thinking...
                    </div>
                </div>`;
            chatBox.insertAdjacentHTML('beforeend', aiLoadingBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Send Request to OpenAI API
            await sendChatMessage(prompt, loadingId);
        }

        async function sendChatMessage(textPrompt, loadingId) {
            const chatBox = document.getElementById('chat-box');
            
            try {
                const response = await fetch(OPENAI_ENDPOINT, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini", // Fast and low cost
                        messages: [
                            { role: "system", content: "You are Spar, a helpful AI assistant." },
                            { role: "user", content: textPrompt }
                        ]
                    })
                });

                const data = await response.json();
                const targetBubble = document.getElementById(loadingId);

                if (data.choices && data.choices[0] && data.choices[0].message) {
                    const aiText = data.choices[0].message.content;
                    targetBubble.parentElement.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-blue-600/20 text-blue-400 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-sparkles text-sm"></i>
                        </div>
                        <div class="bg-[#1e1f20] border border-[#2d2f31] text-gray-200 p-4 rounded-2xl rounded-tl-none text-sm max-w-[85%] space-y-2 shadow-sm">
                            <div class="flex items-center gap-2 text-blue-400 font-bold text-xs">
                                Spar AI
                            </div>
                            <p class="leading-relaxed whitespace-pre-wrap">${escapeHTML(aiText)}</p>
                        </div>`;
                } else if (data.error) {
                    targetBubble.parentElement.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-red-600/20 text-red-400 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                        </div>
                        <div class="bg-[#1e1f20] border border-red-500/50 text-red-400 p-4 rounded-2xl rounded-tl-none text-sm max-w-[85%]">
                            <strong>API Error:</strong> ${escapeHTML(data.error.message || "Request failed.")}
                        </div>`;
                }
            } catch (err) {
                const targetBubble = document.getElementById(loadingId);
                if (targetBubble) {
                    targetBubble.parentElement.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-red-600/20 text-red-400 flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                        </div>
                        <div class="bg-[#1e1f20] border border-red-500/50 text-red-400 p-4 rounded-2xl rounded-tl-none text-sm max-w-[85%]">
                            <strong>Network Error:</strong> Failed to connect to OpenAI API. Check your internet connection or key.
                        </div>`;
                }
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
